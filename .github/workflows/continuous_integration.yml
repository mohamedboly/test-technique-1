---
name: CI

env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

on:
  pull_request: null
jobs:
  install-deps:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 20
    steps:
      - uses: actions/checkout@v4
      - name: Cache node_modules using package-lock.json
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: cache-node-modules-${{ hashFiles('**/package-lock.json') }}-${{hashFiles('**/schema.prisma')}}
      - uses: actions/setup-node@v4
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install Optionnal Dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm i -O @nx/nx-linux-x64-gnu
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

  distributed-task:
    runs-on: ubuntu-latest
    needs: install-deps
    strategy:
      matrix:
        node-version:
          - 20
    steps:
      - uses: actions/checkout@v4
      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: cache-node-modules-${{ hashFiles('**/package-lock.json') }}-${{hashFiles('**/schema.prisma')}}
      - run: git fetch origin main
      - run: git branch --track main origin/main
      - run: npx nx affected --target=test --parallel=3 --passWithNoTests
      - run: npx nx affected --target=build

